<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sliding Puzzle</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#667eea,#764ba2);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.game{
background:white;
color:black;
padding:30px;
border-radius:15px;
width:420px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

h1{
margin-top:0;
}

#puzzle{
display:grid;
gap:8px;
margin-top:20px;
}

.tile{
background:#4a6cf7;
color:white;
font-size:24px;
font-weight:bold;
display:flex;
justify-content:center;
align-items:center;
border-radius:10px;
height:80px;
cursor:pointer;
transition:0.2s;
}

.tile:hover{
transform:scale(1.05);
background:#3955d3;
}

.empty{
background:transparent;
cursor:default;
}

.controls{
margin-top:20px;
}

button{
padding:10px 18px;
margin:5px;
border:none;
border-radius:8px;
background:#4a6cf7;
color:white;
font-size:15px;
cursor:pointer;
}

button:hover{
background:#3955d3;
}

.level{
margin-top:10px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="game">

<h1>Sliding Puzzle</h1>

<div id="puzzle"></div>

<div class="controls">
<button onclick="resetGame()">Reset</button>
<button onclick="nextLevel()">Next Level</button>
<div class="level">Level: <span id="level">1</span></div>
</div>

</div>

<script>

let level=1
let size=3
let board=[]
let empty={}

const puzzle=document.getElementById("puzzle")

function init(){

board=[]
let num=1

for(let r=0;r<size;r++){

let row=[]

for(let c=0;c<size;c++){

if(r===size-1 && c===size-1){
row.push(0)
empty={r,c}
}else{
row.push(num++)
}

}

board.push(row)

}

shuffle()
render()

}

function shuffle(){

for(let i=0;i<500;i++){

let n=getNeighbors()
let rand=n[Math.floor(Math.random()*n.length)]

swap(empty,rand)
empty=rand

}

}

function render(){

puzzle.innerHTML=""
puzzle.style.gridTemplateColumns=`repeat(${size},1fr)`

board.forEach((row,r)=>{

row.forEach((tile,c)=>{

let div=document.createElement("div")

div.className="tile"

if(tile===0){
div.classList.add("empty")
}else{
div.innerText=tile
}

div.onclick=()=>move(r,c)

puzzle.appendChild(div)

})

})

}

function move(r,c){

let n=getNeighbors()

if(n.some(p=>p.r===r && p.c===c)){

swap({r,c},empty)
empty={r,c}

render()

if(checkWin()){
setTimeout(()=>{
alert("Level Complete!")
nextLevel()
},200)
}

}

}

function getNeighbors(){

let list=[]

let {r,c}=empty

if(r>0) list.push({r:r-1,c})
if(r<size-1) list.push({r:r+1,c})
if(c>0) list.push({r,c:c-1})
if(c<size-1) list.push({r,c:c+1})

return list

}

function swap(a,b){

let t=board[a.r][a.c]
board[a.r][a.c]=board[b.r][b.c]
board[b.r][b.c]=t

}

function checkWin(){

let n=1

for(let r=0;r<size;r++){
for(let c=0;c<size;c++){

if(r===size-1 && c===size-1) return true

if(board[r][c]!==n++) return false

}
}

}

function nextLevel(){

level++
size++

document.getElementById("level").innerText=level

init()

}

function resetGame(){

init()

}

init()

</script>

</body>
</html>
